<script>
  // Drop-in custom favicon: place `favicon.png` in repo root.
  // The default 📚 emoji shows immediately; if favicon.png loads successfully
  // we swap it in. Browsers don't reliably fall back across multiple
  // <link rel="icon"> tags when the first 404s, so we do it explicitly here.
  (function () {
    var img = new Image();
    img.onload = function () {
      var link = document.getElementById('nr-favicon');
      if (link) link.href = 'favicon.png?' + Date.now();
    };
    img.src = 'favicon.png?' + Date.now();
  })();
</script>
